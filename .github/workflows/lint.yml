# what is goal of this workflow.
# whenever someone changes the python code, linter will check if the syntax, format,indentation is correct or not

name: Auto Linter
on:  
  push: 
    paths: "*.py"

jobs:  
  code:
    runs-on: ubuntu-latest
    steps:
      # this step will automatically clone the code of the current branch into the runner
      - name: Checkout/Clone the code
        uses: actions/checkout@v7

    # this step will install python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          
      # this install the linting tool
      - name: Install linter
        run:  pip install ruff

      - name: run the linter
        run: ruff check .
        


        
    
